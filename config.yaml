process:
  file: "data/Friends_script.csv"
  num_sequences: 50_000
  max_context_length: 10
  output: "data/processed_data.parquet"
  main_characters: [
    "Ross",
    "Phoebe",
    "Rachel",
    "Joey",
    "Chandler",
    "Monica"
  ]

train:
  train_file: "data/processed_data_train.parquet"
  val_file: "data/processed_data_val.parquet"
  num_heads: 4
  dropout: 0.2
  scheduler_mode: "min"
  scheduler_factor: 0.5
  scheduler_patience: 2
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  epochs: 50
  patience: 5

embeddings:
  model_url: "http://localhost:8081"
  dimension: 1024
  batch_size: 10
